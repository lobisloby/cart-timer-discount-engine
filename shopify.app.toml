client_id = "55db873a11642b8a25325fec3257209a"
name = "Cart-Timer-Discount-Engine"
application_url = "https://cart-timer-discount-engine-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
scopes = "write_metaobject_definitions,write_metaobjects,write_products,write_discounts"

[auth]
redirect_urls = [ "https://cart-timer-discount-engine-production.up.railway.app/api/auth" ]

[app_proxy]
url = "https://cart-timer-discount-engine-production.up.railway.app/api/storefront"
subpath = "timer"
prefix = "apps"